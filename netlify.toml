[build]
  publish = "."
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# No cachear el HTML: que el navegador siempre traiga la última versión
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
  from = "/api/scores"
  to = "/.netlify/functions/scores"
  status = 200
[[headers]]
  for = "/version.txt"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
